<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Form</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        font-family: serif;
        padding: 20px;
      }

      p.intro {
        margin-bottom: 10px;
        font-family: sans-serif;
        font-size: 0.9rem;
      }

      .container {
        border: 1px solid #555;
        width: 320px;
        padding: 16px 20px 20px;
      }

      .container h1 {
        font-size: 1.5rem;
        font-weight: normal;
        padding-bottom: 10px;
        border-bottom: 1px solid #aaa;
        margin-bottom: 18px;
      }

      .container p.question {
        font-size: 0.9rem;
        margin-bottom: 10px;
      }

      .radio-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-left: 10px;
        margin-bottom: 16px;
        font-size: 0.9rem;
      }

      .radio-group label {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .search-label {
        font-size: 0.9rem;
        display: block;
        margin-bottom: 6px;
      }

      input[type="text"] {
        width: 180px;
        padding: 2px 4px;
        border: 1px solid #aaa;
        margin-bottom: 16px;
      }

      .btn-group {
        display: flex;
        gap: 8px;
      }

      button {
        padding: 3px 12px;
        border: 1px solid #aaa;
        background-color: #f0f0f0;
        cursor: pointer;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Search our web site!</h1>

      <form action="#" method="get">
        <p class="question">Where do you want to search?</p>

        <div class="radio-group">
          <label>
            <input type="radio" name="section" value="whole" checked /> Whole
            site
          </label>
          <label>
            <input type="radio" name="section" value="business" /> Business
            Partners Section
          </label>
          <label>
            <input type="radio" name="section" value="corporate" /> Corporate
            Communications Section
          </label>
          <label>
            <input type="radio" name="section" value="lotus" /> Lotus Education
            Section
          </label>
        </div>

        <label class="search-label" for="search"
          >Enter a word or two that we can search on:</label
        >
        <input type="text" id="search" name="search" />

        <div class="btn-group">
          <button type="submit">Submit</button>
          <button type="reset">Clear</button>
        </div>
      </form>
    </div>
  </body>
</html>

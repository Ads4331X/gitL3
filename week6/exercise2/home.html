<!doctype html>
<html>
  <head>
    <title>Home Page</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial;
        text-align: center;
        background-color: #f2f2f2;
      }

      header {
        background: #333;
        color: rgb(238, 131, 131);
        padding: 20px;
        text-align: center;
      }

      nav {
        background: #333;
        color: white;
        padding: 10px;
        text-align: center;
      }

      nav a {
        margin: 15px;
        text-decoration: none;
        font-size: 18px;
        color: wheat;
      }

      nav a:hover {
        color: #ffcc00;
        text-decoration: underline;
      }

      nav a:active {
        color: rgb(243, 185, 185);
      }

      img {
        margin-top: 30px;
        background-color: rgb(197, 172, 172);
      }
      .container {
        display: flex;
        justify-content: start;
        align-items: center;
        padding: 50px;
        height: 100vh;
        flex-direction: column;
      }
    </style>

  <body>

    <nav>

      <div class="icon">
        <a href="https://www.google.com" target="_blank">
          <img

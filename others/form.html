<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form action="#" method="post">
      <fieldset>
        <label for="name">Full Name:</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter Your Name"
        />
        <br />
        <br />
        <label for="password">Password:</label>
        <input
          type="password"
          placeholder="Enter Password"
          id="password"
          name="password"
          required
          minlength="6"
        />
        <br /><br />
        <label for="email">Enter Your Email</label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Enter Your Email"
        />
        <br /><br />
        <label for="url">URL:</label>
        <input type="url" placeholder="Enter a Url" name="url" id="url" />
        <br /><br />

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter Your Age" />
        <br /><br />
      </fieldset>
      <fieldset>
        <label for="file">File</label>
        <input
          type="file"
          id="file"
          name="file"
          placeholder="Enter File"
          accept=".doc .pdf"
        />

        <label for="multiple">Image</label>
        <input
          type="file"
          id="multiple"
          name="multiple"
          placeholder="Enter File"
          multiple
          accept=".img"
        />
      </fieldset>

      <fieldset>
        <legend for="dateTime">Date Time</legend>
        <input
          type="datetime-local"
          id="dateTime"
          name="dateTime"
          placeholder="Enter Date Time"
        />
        <br /><br />
        <label for="date">Date:</label>
        <input
          type="date"
          id="date"
          name="date"
          placeholder="Enter Your Date"
          min="1999-1-1"
          max="2026-2-2"
        />

        <br /><br />
        <label for="time">Time</label>
        <input type="time" id="time" name="time" placeholder="Enter Time" />
      </fieldset>
      <fieldset>
        <legend for="color">Color:</legend>
        <input
          type="color"
          id="color"
          name="color"
          placeholder="Enter Your Color"
        />
      </fieldset>
      <fieldset>
        <legend for="range">Range:</legend>
        <input
          type="range"
          id="range"
          name="range"
          placeholder="Enter Your Range"
          min="0"
          max="100"
        />
      </fieldset>
      <fieldset>
        <legend>Search</legend>
        <input
          type="search"
          id="search"
          name="search"
          placeholder="Enter Your Search"
        />
      </fieldset>
      <fieldset>
        <label for="gender">Gender:</label>
        <input type="radio" name="gender" id="gender" value="male" />
        <label for="male">Male</label>
        <input type="radio" name="gender" id="gender" value="female" />
        <label for="female">Female</label>
        <br />
        <br />
      </fieldset>

      <fieldset>
        <label for="skills">Skills:</label>
        <input type="checkbox" name="skills" id="skills" value="html" />
        <label for="html">HTML</label>
        <input type="checkbox" name="skills" id="skills" value="css" />
        <label for="css">CSS</label>
        <input type="checkbox" name="skills" id="js" value="js" />
        <label for="js">JavaScript</label>
      </fieldset>
      <fieldset>
        <label for="select">Country:</label>
        <select name="select" id="select">
          <option value="Np">Nepal</option>
          <option value="In">India</option>
          <option value="Bh">Bhutan</option>
          <option value="Pk">Pakistan</option>
        </select>

        <label for="cities">Cities:</label>
        <input list="cities" />
        <datalist id="cities">
          <option value="ktm">Kathmandu</option>
          <option value="bkt">Bhaktapur</option>
          <option value="cht">Chitwan</option>
        </datalist>
      </fieldset>
      <fieldset>
        <label for="textarea">Textarea:</label>
        <textarea name="textarea" id="textarea" cols="30" rows="10"></textarea>
      </fieldset>
      <fieldset>
        <button type="submit">Submit</button><button type="reset">Reset</button>
      </fieldset>
    </form>
  </body>
</html>

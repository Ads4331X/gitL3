<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Loop Images</title>
  </head>
  <body>
    <div id="Container"></div>

    <script>
      let container = document.getElementById("Container");

      for (let i = 1; i <= 4; i++) {
        let img = document.createElement("img");
        img.src = `images/${i}.jpg`;
        img.width = 150;
        img.style.margin = "10px";

        container.appendChild(img);
      }
    </script>
  </body>
</html>

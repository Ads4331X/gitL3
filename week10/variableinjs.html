<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variables in Js</title>
  </head>
  <body>
    <div class="container"></div>
  </body>

  <script>
    let number = Number(prompt("Enter a number:"));
    let float = parseFloat(prompt("Enter a float:"));
    let string = prompt("Enter a string:");
    let boolean = prompt("Enter a boolean:");
    if (boolean) boolean = true;
    else boolean = false;

    document.write("<h2>Number: " + number + "</h2>");
    document.write("<h2>Float: " + float + "</h2>");
    document.write("<h2>String: " + string + "</h2>");
    document.write("<h2>Boolean: " + boolean + "</h2>");
  </script>
</html>
